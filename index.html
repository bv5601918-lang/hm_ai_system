<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SYSTEM</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000814,#001d3d);
    color:white;
}

/* LOGIN */
#loginBox{
    height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#loginBox h2{
    color:#ffd60a;
    font-size:28px;
    letter-spacing:2px;
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    text-align:center;
    font-size:16px;
    outline:none;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

/* LOGIN BUTTON COLOR */
#loginBtn{
    background:linear-gradient(90deg,#00b4d8,#0077b6);
    color:white;
}

/* ERROR MESSAGE */
#message{
    margin-top:10px;
    color:#ff4d6d;
}

/* APP */
#app{
    display:none;
    min-height:100vh;
    text-align:center;
    padding:20px;
}

/* TITLE */
h1{
    color:#00b4d8;
    letter-spacing:3px;
    font-size:26px;
}

/* BIG SMALL */
#result{
    font-size:120px;
    font-weight:bold;
    margin-top:40px;
    color:#ffd60a;
    text-shadow:0 0 20px #00b4d8;
    animation:glow 1s infinite alternate;
}

@keyframes glow{
    from{transform:scale(0.95);opacity:0.6;}
    to{transform:scale(1.05);opacity:1;}
}

/* TIMER */
#timer{
    font-size:55px;
    margin-top:10px;
    color:#00b4d8;
}

/* BUTTON BAR */
.tabs{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
}

.tabs button{
    flex:1;
    padding:18px;
    border:none;
    font-size:16px;
    font-weight:bold;
}

/* AI BUTTON */
#aiBtn{
    background:#0077b6;
    color:white;
}

/* GAME BUTTON */
#gameBtn{
    background:#ffd60a;
    color:#000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>AI SYSTEM LOGIN</h2>

    <input id="password" type="password" placeholder="Enter Password">

    <button id="loginBtn" onclick="login()">LOGIN</button>

    <div id="message"></div>
</div>

<!-- APP -->
<div id="app">

    <h1>AI SYSTEM DASHBOARD</h1>

    <div id="result">---</div>

    <div id="timer">30</div>

    <p>REAL TIME SIMULATION</p>

    <div class="tabs">
        <button id="aiBtn" onclick="openAI()">AI</button>
        <button id="gameBtn" onclick="openGame()">GAME</button>
    </div>

</div>

<script>
const PASSWORD = "MEHEDIVAI115";

let countdown = 30;
let started = false;

/* LOGIN FIXED */
function login(){

    const pass = document.getElementById("password").value;
    const msg = document.getElementById("message");

    if(pass === PASSWORD){

        msg.style.color = "#00ff88";
        msg.innerText = "LOGIN SUCCESS";

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        if(!started){
            started = true;
            startSystem();
        }

    }else{
        msg.innerText = "WRONG PASSWORD";
    }
}

/* RANDOM */
function randomResult(){
    return Math.random() < 0.5 ? "BIG" : "SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText = randomResult();

    setInterval(()=>{

        countdown--;

        document.getElementById("timer").innerText = countdown;

        if(countdown <= 0){
            countdown = 30;
            document.getElementById("result").innerText = randomResult();
        }

    },1000);
}

/* AI */
function openAI(){
    window.scrollTo({top:0,behavior:"smooth"});
}

/* GAME */
function openGame(){
    window.open(
        "https://hgnice.bet/#/register?invitationCode=531211974484",
        "_blank"
    );
}
</script>

</body>
  </html>
