<!DOCTYPE html>
<html>
<head>
  <title>HM BD Earning</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HOME -->
  <div id="home">
    <h2>🏠 Home Page</h2>

    <p id="balanceText">💰 Balance: ৳0.00</p>

    <button onclick="watchAd()">🎥 Watch Ads & Earn ৳0.50</button>

  </div>

  <!-- TASKS -->
  <div id="tasks" style="display:none;">
    <h2>📋 Tasks Page</h2>
  </div>

  <!-- PACKAGES -->
  <div id="packages" style="display:none;">
    <h2>📦 Packages Page</h2>
  </div>

  <!-- MENU -->
  <div id="menu" style="display:none;">
    <h2>☰ Menu Page</h2>
  </div>

  <!-- BOTTOM MENU -->
  <div class="menu">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('tasks')">Tasks</button>
    <button onclick="showPage('packages')">Packages</button>
    <button onclick="showPage('menu')">Menu</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
