<!DOCTYPE html>
<html>
<head>
  <title>HM BD Earning</title>

  <link rel="stylesheet" href="style.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h2>🏠 Home</h2>
  <p id="balanceText">💰 Balance: ৳0.00</p>

  <button onclick="watchAd()">🎥 Watch Ad (+৳0.50)</button>
</div>

<!-- TASKS -->
<div id="tasks" style="display:none;">
  <h2>📋 Tasks</h2>

  <input type="file" id="img1">
  <button onclick="submitTask(2,'Task 1','img1')">Join Task 1 (+৳2)</button>
</div>

<!-- REFERRAL -->
<div id="referral" style="display:none;">
  <h2>🤝 Referral</h2>
  <p>Your Code:</p>
  <h3 id="refCode"></h3>

  <button onclick="copyRef()">Copy Link</button>

  <p>Total Referrals: <span id="refCount">0</span></p>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none;">
  <h2>🛠 Admin Panel</h2>
  <div id="adminList"></div>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('tasks')">Tasks</button>
  <button onclick="showPage('referral')">Referral</button>
  <button onclick="showPage('admin')">Admin</button>
</div>

<script src="app.js"></script>
</body>
</html>
