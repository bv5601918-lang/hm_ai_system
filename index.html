<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI BOSS AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    background:#000814;
    color:white;
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#mainTitle{
    font-size:28px;
    font-weight:900;
    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 2s linear infinite;
}

@keyframes glow{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    text-align:center;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:10px;
}

/* ERROR */
#message{
    text-align:center;
    font-weight:bold;
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

/* 7 COLOR TITLE */
#devText{
    font-size:22px;
    font-weight:900;
    animation:colorSwap 3.5s infinite;
}

/* 7 COLOR ANIMATION */
@keyframes colorSwap{

0%{
    color:#ff0000;
    opacity:1;
    transform:scale(1);
}

14%{
    color:#ff9900;
    opacity:0.2;
    transform:scale(0.95);
}

28%{
    color:#ffff00;
    opacity:1;
    transform:scale(1.05);
}

42%{
    color:#00ff00;
    opacity:0.3;
    transform:scale(1);
}

56%{
    color:#00ffff;
    opacity:1;
    transform:scale(1.1);
}

70%{
    color:#0000ff;
    opacity:0.4;
    transform:scale(0.95);
}

84%{
    color:#ff00ff;
    opacity:1;
    transform:scale(1);
}

100%{
    color:#ff0000;
    opacity:0.2;
}
}

/* BIG SMALL */
#result{
    font-size:120px;
    font-weight:900;
}

/* TIMER */
#timer{
    font-size:60px;
    color:#ffd60a;
}

/* LOGS */
#logs{
    margin-top:20px;
    height:120px;
    overflow:hidden;
    font-size:12px;
    color:#00ff99;
    border:1px solid #00ff99;
    padding:10px;
}

/* ANIM TEXT LINE */
#animatedLine{
    margin-top:15px;
    font-weight:bold;
    animation:fadeMove 1.5s infinite;
}

@keyframes fadeMove{
    0%{opacity:0; transform:translateY(10px)}
    50%{opacity:1}
    100%{opacity:0; transform:translateY(-10px)}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">

    <div id="mainTitle">MEHEDI BOSS AI SYSTEM PRO</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="message"></div>

</div>

<!-- APP -->
<div id="app">

    <div id="devText">
        🔥 MEHEDI VAI BEST DEVELOPER BANGLADESH NO.1 🔥
    </div>

    <div id="result">---</div>

    <div id="timer">30</div>

    <div id="animatedLine" id="textCycle"></div>

    <div id="logs"></div>

</div>

<script>

const PASSWORD = "MEHEDIVAI115";

let alarmInterval;
let logsInterval;
let textInterval;

/* LOGIN */
function login(){

    let pass=document.getElementById("password").value;
    let msg=document.getElementById("message");

    if(pass===PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        startSystem();
        startLogs();
        startTextCycle();

    }else{

        msg.innerText="❌ Wrong Password! Contact Admin";

        startAlarm(); // LOOP SOUND
    }
}

/* 🔊 CONTINUOUS ALARM */
function startAlarm(){

    let ctx = new (window.AudioContext||window.webkitAudioContext)();

    alarmInterval = setInterval(()=>{

        let o = ctx.createOscillator();
        let g = ctx.createGain();

        o.type="sawtooth";
        o.frequency.value=600;

        o.connect(g);
        g.connect(ctx.destination);

        o.start();

        setTimeout(()=>o.frequency.value=900,200);
        setTimeout(()=>o.frequency.value=400,400);

        setTimeout(()=>{
            o.stop();
        },600);

    },700);

}

/* STOP LOGIC IF NEEDED */
function stopAlarm(){
    clearInterval(alarmInterval);
}

/* RANDOM BIG SMALL */
function random(){
    return Math.random()<0.5?"BIG":"SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText=random();

    setInterval(()=>{

        let t=document.getElementById("timer");
        t.innerText = (t.innerText-1);

        if(t.innerText<=0){
            t.innerText=30;
            document.getElementById("result").innerText=random();
        }

    },1000);
}

/* LOGS FIX (NO REPEAT SAME LINE) */
function startLogs(){

    const logs=[
    "System boot...",
    "Security scan...",
    "AI module active...",
    "Network stable...",
    "Encryption ON...",
    "Data sync...",
    "Firewall enabled..."
    ];

    let i=0;

    logsInterval=setInterval(()=>{

        document.getElementById("logs").innerText=
        logs[Math.floor(Math.random()*logs.length)];

        i++;

    },1200);
}

/* 7 COLOR TEXT CYCLE */
function startTextCycle(){

    const text=document.getElementById("animatedLine");

    const lines=[
        "💎 MEHEDI SYSTEM ONLINE 💎",
        "🔥 AI CORE ACTIVE 🔥",
        "⚡ SECURITY LEVEL HIGH ⚡",
        "💠 SYSTEM RUNNING 💠",
        "🚀 PERFORMANCE BOOST 🚀",
        "🔒 ENCRYPTION ENABLED 🔒",
        "🌐 NETWORK STABLE 🌐"
    ];

    let i=0;

    textInterval=setInterval(()=>{

        text.innerText=lines[i%lines.length];
        i++;

    },1000);

}

</script>

</body>
        </html>
